name: Publish Python Package to PyPI

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run tests 🧪
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Run tests with pytest
      run: |
        pytest

  tag:
    name: Tag new version 🔖
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Determine bump type from PR labels
      id: type
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
          --jq '.[].labels[].name' 2>/dev/null || true)
        echo "Labels on merged PR: ${labels:-<none>}"
        if echo "$labels" | grep -qx "major"; then
          bump=major
        elif echo "$labels" | grep -qx "minor"; then
          bump=minor
        else
          bump=patch
        fi
        echo "Selected bump type: $bump"
        echo "bump=$bump" >> "$GITHUB_OUTPUT"

    - name: Compute next version from latest tag
      id: version
      run: |
        latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
        if [ -z "$latest" ]; then
          # No tags yet: seed from the last manually published version (2.1.4).
          base="2.1.4"
        else
          base="${latest#v}"
        fi
        echo "Base version: $base (latest tag: ${latest:-<none>})"

        IFS=. read -r major minor patch <<< "$base"

        case "${{ steps.type.outputs.bump }}" in
          major) major=$((major + 1)); minor=0; patch=0 ;;
          minor) minor=$((minor + 1)); patch=0 ;;
          *)     patch=$((patch + 1)) ;;
        esac

        version="${major}.${minor}.${patch}"
        tag="v${version}"
        echo "New version: $version (tag: $tag)"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.version.outputs.tag }}" "${{ github.sha }}" \
          -m "Release ${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build package 📦
    needs: tag
    runs-on: ubuntu-latest

    steps:
    - name: Checkout tag
      uses: actions/checkout@v5
      with:
        ref: ${{ needs.tag.outputs.tag }}
        fetch-depth: 0
        fetch-tags: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Verify built version matches tag
      run: |
        ls dist/
        test -n "$(ls dist/meal_generator-${{ needs.tag.outputs.version }}*.whl 2>/dev/null)" \
          || { echo "Built artifacts do not match expected version ${{ needs.tag.outputs.version }}"; exit 1; }

    - name: Upload package artifact
      uses: actions/upload-artifact@v5
      with:
        name: python-package
        path: dist/

  publish:
    name: Publish package to PyPI 🚀
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/meal-generator

    permissions:
      id-token: write

    steps:
    - name: Download package artifact
      uses: actions/download-artifact@v5
      with:
        name: python-package
        path: dist/

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
